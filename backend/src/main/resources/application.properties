spring.application.name=skillmentor

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skill_mentor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin12}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.error.include-message=always
server.error.include-binding-errors=always

# Clerk Configuration
clerk.jwks.url=${CLERK_JWKS_URL:https://happy-crow-68.clerk.accounts.dev/.well-known/jwks.json}
clerk.issuer=${CLERK_ISSUER:https://happy-crow-68.clerk.accounts.dev}

jwt.secret=${JWT_SECRET:a-string-secret-at-least-256-bits-long-skillmentor}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000}

logging.level.root=INFO
logging.level.com.stemlink.skillmentor.security=INFO